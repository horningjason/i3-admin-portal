<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>i3 Admin Portal</title>
<style>
  :root {
    --surface-1:      #fcfcfb;
    --page:           #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --border:         rgba(11,11,11,0.10);

    --log-query:      #2a78d6;
    --log-response:   #1baf7a;
    --log-state:      #eda100;
    --log-dr:         #008300;
    --log-subscribe:  #4a3aa7;
    --log-other:      #e34948;
    --sip-subscribe:  #e87ba4;
    --sip-notify:     #eb6834;

    --status-good:     #0ca30c;
    --status-warning:  #fab219;
    --status-serious:  #ec835a;
    --status-critical: #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1:      #1a1a19;
      --page:           #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --border:         rgba(255,255,255,0.10);

      --log-query:      #3987e5;
      --log-response:   #199e70;
      --log-state:      #c98500;
      --log-dr:         #008300;
      --log-subscribe:  #9085e9;
      --log-other:      #e66767;
      --sip-subscribe:  #d55181;
      --sip-notify:     #d95926;
    }
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--page);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 14px;
  }
  header {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 14px 20px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 16px;
    margin: 0;
    font-weight: 600;
  }
  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-muted);
    display: inline-block;
    margin-right: 6px;
  }
  .conn-dot.live { background: var(--status-good); }
  .conn-dot.down { background: var(--status-critical); }
  .stat {
    display: flex; flex-direction: column; gap: 2px;
  }
  .stat .value {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 15px;
  }
  .stat .label {
    color: var(--text-secondary);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .spacer { flex: 1; }
  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
  }
  .btn:hover { background: var(--surface-1); color: var(--text-primary); }

  .filters {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 10px 20px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
    background: transparent;
  }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; }
  .chip.off { opacity: 0.35; }
  .filters.secondary { border-top: 1px solid var(--gridline); }

  .nodes {
    display: flex; flex-wrap: wrap; gap: 10px;
    padding: 10px 20px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
  }
  .node-chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .node-chip .role-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .03em;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
  }

  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--gridline);
    flex: 1;
    min-height: 0;
  }
  .panel {
    background: var(--page);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--text-secondary);
    padding: 10px 16px;
    margin: 0;
    background: var(--surface-1);
    border-bottom: 1px solid var(--gridline);
  }
  .rows {
    overflow-y: auto;
    flex: 1;
  }
  .row {
    display: flex;
    gap: 10px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--gridline);
    cursor: pointer;
    align-items: flex-start;
  }
  .row:hover { background: var(--surface-1); }
  .row .time {
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    font-size: 11px;
    white-space: nowrap;
    padding-top: 2px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    padding-top: 2px;
  }
  .badge .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .source-tag {
    font-size: 11px;
    color: var(--text-secondary);
    white-space: nowrap;
    padding-top: 2px;
  }
  .source-tag .role {
    color: var(--text-muted);
    font-weight: 700;
    font-size: 9px;
    letter-spacing: .03em;
  }
  .summary {
    color: var(--text-primary);
    flex: 1;
    word-break: break-word;
  }
  .detail {
    display: none;
    margin: 0 16px 10px 16px;
    padding: 8px 10px;
    background: var(--surface-1);
    border: 1px solid var(--gridline);
    border-radius: 6px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-secondary);
  }
  .detail.open { display: block; }
  .empty {
    padding: 30px 16px;
    color: var(--text-muted);
    font-size: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>i3 Admin Portal</h1>
  <div class="stat">
    <span class="value"><span class="conn-dot" id="conn-dot"></span><span id="conn-label">connecting…</span></span>
    <span class="label">Stream</span>
  </div>
  <div class="stat">
    <span class="value" id="stat-count">{{ events|length }}</span>
    <span class="label">Events buffered</span>
  </div>
  <div class="stat">
    <span class="value" id="stat-last">—</span>
    <span class="label">Last event</span>
  </div>
  <div class="stat">
    <span class="value" id="stat-nodes">—</span>
    <span class="label">Nodes live</span>
  </div>
  <div class="spacer"></div>
  <button class="btn" id="btn-clear">Clear</button>
</header>

<div class="nodes" id="nodes"></div>

<div class="filters" id="filters"></div>
<div class="filters secondary" id="filters-source"></div>

<main>
  <div class="panel">
    <h2>LogEvents (i3 §4.12.3)</h2>
    <div class="rows" id="rows-log"></div>
  </div>
  <div class="panel">
    <h2>SIP State Notifications (§2.4)</h2>
    <div class="rows" id="rows-sip"></div>
  </div>
</main>

<script>
const KIND_META = {
  log_query:     { label: "Query",          color: "var(--log-query)",     panel: "log" },
  log_response:  { label: "Response",       color: "var(--log-response)",  panel: "log" },
  log_state:     { label: "State Change",   color: "var(--log-state)",     panel: "log" },
  log_dr:        { label: "Discrepancy",    color: "var(--log-dr)",        panel: "log" },
  log_subscribe: { label: "Subscribe Log",  color: "var(--log-subscribe)", panel: "log" },
  log_other:     { label: "Other",          color: "var(--log-other)",     panel: "log" },
  sip_subscribe: { label: "SUBSCRIBE",      color: "var(--sip-subscribe)", panel: "sip" },
  sip_notify:    { label: "NOTIFY",         color: "var(--sip-notify)",    panel: "sip" },
};

const activeKinds = new Set(Object.keys(KIND_META));
const activeSources = new Set();   // populated once nodes/events are known
const knownSources = new Set();
const rowsLog = document.getElementById("rows-log");
const rowsSip = document.getElementById("rows-sip");
const filtersEl = document.getElementById("filters");
const filtersSourceEl = document.getElementById("filters-source");
const nodesEl = document.getElementById("nodes");
const statCount = document.getElementById("stat-count");
const statLast = document.getElementById("stat-last");
const statNodes = document.getElementById("stat-nodes");
let total = {{ events|length }};

function buildFilters() {
  for (const [kind, meta] of Object.entries(KIND_META)) {
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.dataset.kind = kind;
    chip.innerHTML = `<span class="dot" style="background:${meta.color}"></span>${meta.label}`;
    chip.addEventListener("click", () => {
      if (activeKinds.has(kind)) { activeKinds.delete(kind); chip.classList.add("off"); }
      else { activeKinds.add(kind); chip.classList.remove("off"); }
      applyFilter();
    });
    filtersEl.appendChild(chip);
  }
}

function ensureSourceChip(name) {
  if (knownSources.has(name)) return;
  knownSources.add(name);
  activeSources.add(name);
  const chip = document.createElement("div");
  chip.className = "chip";
  chip.dataset.source = name;
  chip.textContent = name;
  chip.addEventListener("click", () => {
    if (activeSources.has(name)) { activeSources.delete(name); chip.classList.add("off"); }
    else { activeSources.add(name); chip.classList.remove("off"); }
    applyFilter();
  });
  filtersSourceEl.appendChild(chip);
}

function applyFilter() {
  document.querySelectorAll(".row").forEach(r => {
    r.style.display = (activeKinds.has(r.dataset.kind) && activeSources.has(r.dataset.source)) ? "" : "none";
  });
}

async function loadNodes() {
  try {
    const res = await fetch("/api/nodes");
    const nodeList = await res.json();
    nodesEl.innerHTML = "";
    let live = 0;
    for (const n of nodeList) {
      ensureSourceChip(n.name);
      if (n.sip_status === "live") live += 1;
      const chip = document.createElement("div");
      chip.className = "node-chip";
      const dotColor = !n.has_sip ? "var(--text-muted)"
                      : n.sip_status === "live" ? "var(--status-good)"
                      : n.sip_status === "unreachable" ? "var(--status-critical)"
                      : "var(--status-warning)";
      const statusLabel = !n.has_sip ? "" : n.sip_status === "unreachable" ? " (unreachable)" : "";
      chip.innerHTML = `<span class="conn-dot" style="background:${dotColor};margin-right:0"></span>
                         <span class="role-tag">${escapeHtml(n.role)}</span> ${escapeHtml(n.name)}${statusLabel}`;
      nodesEl.appendChild(chip);
    }
    statNodes.textContent = `${live}/${nodeList.filter(n => n.has_sip).length}`;
  } catch (e) {
    statNodes.textContent = "?";
  }
}

function shortTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString(undefined, { hour12: false }) + "." + String(d.getMilliseconds()).padStart(3, "0");
}

function renderRow(event, prepend) {
  const meta = KIND_META[event.kind] || KIND_META.log_other;
  const target = meta.panel === "sip" ? rowsSip : rowsLog;
  const empty = target.querySelector(".empty");
  if (empty) empty.remove();

  ensureSourceChip(event.source);

  const row = document.createElement("div");
  row.className = "row";
  row.dataset.kind = event.kind;
  row.dataset.source = event.source;
  row.style.display = (activeKinds.has(event.kind) && activeSources.has(event.source)) ? "" : "none";
  row.innerHTML = `
    <span class="time">${shortTime(event.timestamp)}</span>
    <span class="badge" style="color:${meta.color}"><span class="dot" style="background:${meta.color}"></span>${meta.label}</span>
    <span class="source-tag"><span class="role">${escapeHtml(event.role)}</span> ${escapeHtml(event.source)}</span>
    <span class="summary">${escapeHtml(event.summary)}</span>
  `;
  const detail = document.createElement("div");
  detail.className = "detail";
  detail.textContent = formatDetail(event.detail);
  row.addEventListener("click", () => detail.classList.toggle("open"));

  if (prepend) {
    target.prepend(detail);
    target.prepend(row);
  } else {
    target.appendChild(row);
    target.appendChild(detail);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

// LostQueryLogEvent/LostResponseLogEvent carry the entire LoST request or
// response as a raw XML string (queryAdapter/responseAdapter). Detect any
// string field that looks like XML and reformat it with real indentation
// instead of leaving it as one escaped line inside JSON.stringify output.
function looksLikeXml(value) {
  return typeof value === "string" && /^\s*<\??[a-zA-Z]/.test(value);
}

function prettyXml(xml) {
  try {
    const dom = new DOMParser().parseFromString(xml, "application/xml");
    if (dom.querySelector("parsererror")) return xml;
    return formatXmlNode(dom.documentElement, 0).trimEnd();
  } catch (e) {
    return xml;
  }
}

function formatXmlNode(node, depth) {
  const pad = "  ".repeat(depth);
  if (node.nodeType === Node.TEXT_NODE) {
    const text = node.nodeValue.trim();
    return text ? `${pad}${text}\n` : "";
  }
  let attrs = "";
  for (const a of node.attributes || []) attrs += ` ${a.name}="${a.value}"`;
  const children = Array.from(node.childNodes || [])
    .filter(c => c.nodeType !== Node.TEXT_NODE || c.nodeValue.trim());
  if (children.length === 0) return `${pad}<${node.nodeName}${attrs}/>\n`;
  if (children.length === 1 && children[0].nodeType === Node.TEXT_NODE) {
    return `${pad}<${node.nodeName}${attrs}>${children[0].nodeValue.trim()}</${node.nodeName}>\n`;
  }
  let out = `${pad}<${node.nodeName}${attrs}>\n`;
  for (const child of children) out += formatXmlNode(child, depth + 1);
  out += `${pad}</${node.nodeName}>\n`;
  return out;
}

function formatDetail(detail) {
  const lines = [];
  for (const [key, value] of Object.entries(detail)) {
    if (looksLikeXml(value)) {
      lines.push(`${key}:\n${prettyXml(value)}`);
    } else if (typeof value === "object" && value !== null) {
      lines.push(`${key}: ${JSON.stringify(value, null, 2)}`);
    } else {
      lines.push(`${key}: ${JSON.stringify(value)}`);
    }
  }
  return lines.join("\n\n");
}

function markEmptyIfNeeded() {
  for (const target of [rowsLog, rowsSip]) {
    if (!target.querySelector(".row")) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "No events yet.";
      target.appendChild(empty);
    }
  }
}

document.getElementById("btn-clear").addEventListener("click", async () => {
  await fetch("/api/clear", { method: "POST" });
  rowsLog.innerHTML = "";
  rowsSip.innerHTML = "";
  total = 0;
  statCount.textContent = total;
  statLast.textContent = "—";
  markEmptyIfNeeded();
});

buildFilters();
loadNodes();
setInterval(loadNodes, 10_000);
const initialEvents = {{ events|tojson }};
initialEvents.forEach(e => renderRow(e, false));
markEmptyIfNeeded();

const dot = document.getElementById("conn-dot");
const label = document.getElementById("conn-label");
const sse = new EventSource("/events/stream");
sse.onopen = () => { dot.className = "conn-dot live"; label.textContent = "live"; };
sse.onerror = () => { dot.className = "conn-dot down"; label.textContent = "reconnecting…"; };
sse.onmessage = (e) => {
  const event = JSON.parse(e.data);
  document.querySelectorAll(`.empty`).forEach(el => el.remove());
  renderRow(event, true);
  total += 1;
  statCount.textContent = total;
  statLast.textContent = shortTime(event.timestamp);
};
</script>
</body>
</html>
